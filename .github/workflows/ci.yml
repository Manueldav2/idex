name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Setup Rust
        if: runner.os == 'macOS'
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Build packages
        run: pnpm -r --filter './packages/*' build

      - name: Build landing
        run: pnpm --filter @idex/landing build

      - name: Build desktop renderer
        run: pnpm --filter @idex/desktop build:renderer

      - name: Check Tauri backend
        if: runner.os == 'macOS'
        run: pnpm tauri:check

      - name: Build Tauri desktop bundle
        if: runner.os == 'macOS'
        run: |
          pnpm --filter @idex/desktop build
